# Supabase config for the Mathetes backend.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "mathetes-backend"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[storage.buckets.devotional-images]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[storage.buckets.verse-images]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "mathetes://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Edge functions. These are invoked by Database Webhooks (send-push,
# moderate-message) or by the scheduler (daily-content-publish, archive-term),
# not by end-user JWTs, so JWT verification is disabled. They authenticate to
# Postgres with the service-role key from their environment.
[functions.send-push]
verify_jwt = false

[functions.moderate-message]
verify_jwt = false

[functions.daily-content-publish]
verify_jwt = false

[functions.archive-term]
verify_jwt = false

# Giving (V2.1) — Paystack. initialize is user-called (JWT); webhook is called by
# Paystack and verifies the x-paystack-signature itself, so no JWT.
[functions.paystack-initialize]
verify_jwt = true

[functions.paystack-webhook]
verify_jwt = false

[functions.paystack-manage-recurring]
verify_jwt = true
