name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  database:
    name: Migrations, RLS & Bible
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Smoke-test migrations + seed
        run: ./scripts/test-migrations.sh

      - name: RLS regression suite
        run: ./scripts/test-rls.sh

      - name: Verify full KJV import
        run: ./scripts/test-kjv.sh

      - name: Verify public-domain translations (WEB/BSB/ASV)
        run: ./scripts/test-bible.sh
